- title: A Global-scale Database of Seismic Phases from Cloud-based Picking at Petabyte
    Scale
  authors: Ni,  Yiyu, Denolle,  Marine, Thomas,  Amanda, Hamilton,  Alex, Münchmeyer,  Jannes,
    Wang,  Yinzhi, Bachelot,  Loïc, Trabant,  Chad, Mencin,  David
  year: '2025'
  key: Denolle2025c
  month: sep
  journal: Seismica, 4(2)
  doi: 10.26443/seismica.v4i2.1738
  url: https://seismica.library.mcgill.ca/article/view/1738
  bibtex: |
    @article{Denolle2025c,
      author = {Ni, Yiyu and Denolle, Marine and Thomas, Amanda and Hamilton, Alex and Münchmeyer, Jannes and Wang, Yinzhi and Bachelot, Loïc and Trabant, Chad and Mencin, David},
      title = {A Global-scale Database of Seismic Phases from Cloud-based Picking at Petabyte Scale},
      volume = {4},
      url = {https://seismica.library.mcgill.ca/article/view/1738},
      doi = {10.26443/seismica.v4i2.1738},
      abstractnote = {<p> We present the first global-scale database of 4.3 billion P- and S-wave picks extracted from 1.3 PB continuous seismic data via a cloud-native workflow. Using cloud computing services on Amazon Web Services, we launched ~145,000 containerized jobs on continuous records from 47,354 stations spanning 2002-2025, completing in under three days. Phase arrivals were identified with a deep learning model, PhaseNet, through an open-source Python ecosystem for deep learning, SeisBench. To visualize and gain a global understanding of these picks, we present preliminary results about pick time series revealing Omori-law aftershock decay, seasonal variations linked to noise levels, and dense regional coverage that will enhance earthquake catalogs and machine-learning datasets. We provide all picks in a publicly queryable database, providing a powerful resource for researchers studying seismicity around the world. This report provides insights into the database and the underlying workflow, demonstrating the feasibility of petabyte-scale seismic data mining on the cloud and of providing intelligent data products to the community in an automated manner.</p>},
      number = {2},
      journal = {Seismica},
      year = {2025},
      month = sep,
      month_numeric = {9}
    }
  tags: []
